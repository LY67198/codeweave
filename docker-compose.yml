# D:\Mini_Code\docker-compose.yml
services:
  postgres:
    image: postgres:16-alpine
    container_name: codeweave-postgres
    environment:
      POSTGRES_DB: codeweave
      POSTGRES_USER: codeweave
      POSTGRES_PASSWORD: codeweave_dev
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeweave"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: codeweave-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
